<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PISL FieldOps Enterprise v41.0</title>
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/main.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head><body>
<div id="toast" class="toast hidden"></div>
<div id="drawerBackdrop" class="drawerBackdrop" onclick="toggleMenu(false)"></div>
<section id="login" class="login"><div class="login-card">
  <div class="brandLogo"><img src="assets/logo.png" alt="Payaswini Integrated Solutions"></div>
  <h1>PISL FieldOps Enterprise</h1><p>v41.0 Connectivity + Push + Detailed Checklists</p>
  <label>Username</label><input id="u" placeholder="Username" autocomplete="username" value="sandeep">
  <label>Password</label><input id="p" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()" value="admin123">
  <div id="loginMsg" class="msg"></div><button class="btn full" onclick="login()">Login</button>
  <div class="installBox noPrint">
    <button id="installBtn" class="btn ok full" onclick="installAndEnablePush()">Install App + Enable Important Alerts</button>
    <small id="installStatus">Install the app and enable only necessary ticket alerts. You can also enable alerts later from Administration.</small>
  </div>
  <small>© 2026 Payaswini Integrated Solutions</small>
</div></section>
<section id="app" class="app hidden">
  <aside id="side" class="side">
    <div class="sideBrand"><img src="assets/logo.png" alt="Payaswini Integrated Solutions"></div>
    <div class="userBlock"><b id="who"></b><span id="role"></span></div><nav id="nav"></nav>
    <button class="btn secondary full" onclick="logout()">Logout</button>
  </aside>
  <main class="main"><header class="topbar"><button class="menuBtn" onclick="toggleMenu(true)">☰</button><div><h1 id="pageTitle">Dashboard</h1><p id="pageSubtitle">v41.0 Connectivity + Push + Detailed Checklists</p></div><div class="topActions"><button class="btn secondary" onclick="jobPanel='create';go('jobs')">+ Ticket</button></div></header><section id="view"></section></main>
</section>
<script src="js/firebase-config.js"></script><script src="js/app.js"></script>
</body></html>
