<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PISL FieldOps Enterprise v35.0.0 Cloud Edition</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--primary:#163e73;--accent:#f28c28;--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#e3e8ef;--ok:#12805c;--bad:#b42318;--warn:#b54708}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px} button,input,select,textarea{font:inherit} .hidden{display:none!important}
.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0e2e57,#1d5c9c)} .login-card{width:min(430px,92vw);background:#fff;border-radius:22px;padding:28px;box-shadow:0 24px 70px #0005} .logo{max-width:205px;height:auto;display:block;margin:0 auto 18px} .field{margin:10px 0} label{font-weight:700;font-size:12px;color:#344054;display:block;margin-bottom:6px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff} textarea{min-height:84px;resize:vertical} .btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--primary);color:#fff;margin:4px} .btn.secondary{background:#eef2f7;color:var(--primary)} .btn.warn{background:var(--warn)} .btn.ok{background:var(--ok)} .btn.bad{background:var(--bad)} .btn:disabled{opacity:.5;cursor:not-allowed}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh} .side{background:#102b4c;color:#fff;padding:16px;position:sticky;top:0;height:100vh;overflow:auto} .side .logo{background:#fff;border-radius:14px;padding:8px;margin-bottom:12px} .nav button{width:100%;text-align:left;margin:5px 0;background:transparent;color:#dbe8ff;border:1px solid #ffffff22;border-radius:12px;padding:10px;cursor:pointer} .nav button.active,.nav button:hover{background:#ffffff18} .main{padding:16px;max-width:1200px;width:100%;margin:auto} .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px} .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px} .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))} .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 4px 16px #1b33550a;margin-bottom:12px} .stat{cursor:pointer} .stat h2{margin:2px 0;font-size:28px;color:var(--primary)} .muted{color:var(--muted)} .pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:5px 9px;background:#eef2f7;font-weight:800;font-size:12px;margin:3px} .pill.ok{background:#e8f7f0;color:var(--ok)} .pill.warn{background:#fff3e5;color:#b54708} .pill.bad{background:#fee4e2;color:#b42318}
.tablewrap{overflow:auto} table{width:100%;border-collapse:collapse;background:#fff} th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top} th{background:#f8fafc;font-size:12px;color:#475467} .actions{display:flex;flex-wrap:wrap;gap:6px} .chips{display:flex;flex-wrap:wrap;gap:8px} .chip{border:1px solid var(--line);border-radius:999px;padding:8px 11px;cursor:pointer;background:#fff;font-weight:700} .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.steps{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0} .step{font-size:12px;border-radius:999px;padding:6px 9px;background:#edf2f7;color:#344054} .step.done{background:#d1fadf;color:#067647} .step.active{background:#ffead5;color:#b54708}
.badge{background:#e11d48;color:#fff;border-radius:999px;padding:2px 7px;font-size:11px;margin-left:5px} .note{background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:10px;color:#92400e} .preview{background:#fff;border:1px solid #d0d5dd;border-radius:16px;padding:22px;color:#111} .report-header{display:flex;justify-content:space-between;border-bottom:3px solid var(--primary);padding-bottom:12px;margin-bottom:14px} .report-header img{max-width:170px} .sigbox{border:1px dashed #98a2b3;height:80px;border-radius:12px;background:#fcfcfd;margin-top:6px}
@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid,.grid.two{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}
@media print{.side,.topbar,.no-print,.btn{display:none!important}.app{display:block}.main{max-width:none;padding:0}.card{box-shadow:none;border:0}body{background:#fff}}
</style>
</head><body>

function load(){try{let s=JSON.parse(localStorage.getItem(LS)); if(s){state=Object.assign(state,s); if(!state.users) state.users=DEFAULT_USERS.slice();}}catch(e){console.warn('Local load failed',e)}}
function save(broadcast=true){localStorage.setItem(LS,JSON.stringify(state)); if(broadcast&&channel) channel.postMessage({type:'sync'}); if(!cloudSilent) cloudSave();}
window.addEventListener('storage',e=>{if(e.key===LS){load(); render();}}); if(channel) channel.onmessage=e=>{if(e.data.type==='sync'){load(); render();}};
function now(){return new Date().toLocaleString('en-IN')}
function id(prefix){let d=new Date(); return prefix+'-'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+String(Math.floor(Math.random()*9000+1000))}
function login(){load(); const user=users().find(x=>x.username===u.value.trim()&&x.password===p.value.trim()&&x.status!=='Inactive'); if(!user) return loginMsg.textContent='Invalid login or inactive user'; current=user; sessionStorage.setItem('pisl_user',JSON.stringify(user)); document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); init();}
function logout(){sessionStorage.removeItem('pisl_user'); location.reload()}
function init(){document.getElementById('who').textContent=current.name; document.getElementById('role').textContent=current.role; buildNav(); render();}
function buildNav(){let items=[['dashboard','Dashboard'],['jobs','Jobs'],['notifications','Notifications'],['history','Site/Asset History']]; if(['Admin','Coordinator'].includes(current.role)) items.splice(1,0,['create','Create Job']); if(current.role==='Admin') items.push(['proposal','Proposal / Quotation'],['settings','Settings']); nav.innerHTML=items.map(i=>`<button id="nav_${i[0]}" onclick="go('${i[0]}')">${i[1]}${i[0]=='notifications'?badge():''}</button>`).join('')}
function badge(){let n=unread().length; return n?`<span class="badge">${n}</span>`:''}
function go(v){activeView=v; activeJob=null; render();}
function render(){if(!current) return; buildNav(); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); let nb=document.getElementById('nav_'+activeView); if(nb) nb.classList.add('active'); if(activeJob) return renderJob(activeJob); const map={dashboard:renderDashboard,jobs:renderJobs,create:renderCreate,notifications:renderNotifications,history:renderHistory,proposal:renderProposal,settings:renderSettings}; (map[activeView]||renderDashboard)();}
function relevantJobs(){if(['Admin','Coordinator','Supervisor'].includes(current.role)) return state.jobs; return state.jobs.filter(j=>j.assignedTo===current.username || j.acceptedBy===current.username)}
function notify(users,title,msg,jobId=''){[...new Set(users.filter(Boolean))].forEach(u=>state.notifications.unshift({id:id('NTF'),to:u,title,msg,jobId,read:false,at:now()})); save();}
function notifyWorkflow(job,action){let users=[job.createdBy,job.assignedTo,'coordinator','supervisor','sandeep']; if(action==='Report submitted') users=['coordinator','supervisor','sandeep']; if(action==='Ticket closed') users=[job.assignedTo,job.acceptedBy,job.createdBy,'coordinator','supervisor','sandeep']; notify(users,`${job.ticketId} · ${action}`,`${job.client} / ${job.site} · ${job.type}`,job.ticketId)}
function unread(){return state.notifications.filter(n=>n.to===current.username&&!n.read)}
function dashCard(label,count,filter){return `<div class="card stat" onclick="activeView='jobs'; window.jobFilter='${filter}'; render()"><div class="muted">${label}</div><h2>${count}</h2></div>`}
function renderDashboard(){pageTitle.textContent='Dashboard'; let r=relevantJobs(); let open=r.filter(j=>!['Closed'].includes(j.status)); view.innerHTML=`<div class="grid">${dashCard('My / Team Open Jobs',open.length,'open')}${dashCard('Pending Report',r.filter(j=>j.status==='Working').length,'Working')}${dashCard('Pending Check-Out',r.filter(j=>j.status==='Report Shared').length,'Report Shared')}${dashCard('Unread Notifications',unread().length,'notif')}</div><div class="card"><h3>Workflow Rules</h3><div class="steps">${['Assigned','Accepted','Traveling','Checked-In','Working','Report Draft','Report Shared','Checked-Out','Closed'].map(s=>`<span class="step">${s}</span>`).join('')}</div><p class="note">Real-time across different phones requires Firebase/Firestore free tier configuration. Without cloud config, sync works only inside the same browser/origin through local storage.</p></div><div class="card"><h3>Recent Jobs</h3>${jobsTable(r.slice(0,8))}</div>`}
function jobsTable(arr){return `<div class="tablewrap"><table><tr><th>Ticket</th><th>Client/Site</th><th>Type</th><th>Systems</th><th>Status</th><th>Assigned</th><th>Action</th></tr>${arr.map(j=>`<tr><td><b>${j.ticketId}</b></td><td>${j.client}<br><span class="muted">${j.site}</span></td><td>${j.type}<br><span class="pill ${j.priority==='Critical'?'bad':j.priority==='High'?'warn':''}">${j.priority}</span></td><td>${j.systems.join(', ')}</td><td><span class="pill ok">${j.status}</span></td><td>${j.assignedTo}</td><td><button class="btn secondary" onclick="openJob('${j.ticketId}')">Open</button></td></tr>`).join('')}</table></div>`}
function renderJobs(){pageTitle.textContent='Jobs'; let r=relevantJobs(); if(window.jobFilter&&window.jobFilter!=='open') r=r.filter(j=>j.status===window.jobFilter); if(window.jobFilter==='open') r=r.filter(j=>j.status!=='Closed'); view.innerHTML=`<div class="card"><div class="actions"><button class="btn secondary" onclick="window.jobFilter='';render()">All</button><button class="btn secondary" onclick="window.jobFilter='open';render()">Open</button><button class="btn secondary" onclick="window.jobFilter='Report Shared';render()">Pending Check-Out</button><button class="btn secondary" onclick="window.jobFilter='Checked-Out';render()">Pending Closure</button></div></div><div class="card">${jobsTable(r)}</div>`}
function systemsUI(selected=[]){let sys=['FAS','PAS','CCTV','ACS','WLD','Fire Extinguisher','Exit Signage','Rodent','UPS','Networking']; return `<div class="chips" id="systems">${sys.map(s=>`<span class="chip ${selected.includes(s)?'on':''}" onclick="this.classList.toggle('on')">${s}</span>`).join('')}</div>`}
function renderCreate(){pageTitle.textContent='Create Job'; view.innerHTML=`<div class="card"><h3>New Job / Ticket</h3><div class="grid two"><div class="field"><label>Job Type</label><select id="jobType"><option>Service Call</option><option>Preventive Maintenance</option><option>AMC Survey</option><option>Project Survey</option><option>Installation</option><option>Commissioning</option><option>Snag</option><option>Handover</option></select></div><div class="field"><label>Priority</label><select id="priority"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select></div><div class="field"><label>Client</label><input id="client" list="clients"></div><div class="field"><label>Site / Location</label><input id="site"></div><div class="field"><label>Assign To</label><select id="assign">${users().filter(u=>u.status!=='Inactive').map(u=>`<option value="${u.username}">${u.name} - ${u.role}</option>`).join('')}</select></div><div class="field"><label>SLA Target</label><select id="sla"><option>4 Hours</option><option>8 Hours</option><option>24 Hours</option><option>48 Hours</option><option>Scheduled</option></select></div></div><datalist id="clients">${state.clients.map(c=>`<option value="${c}">`).join('')}</datalist><label>Systems Involved</label>${systemsUI()}<div class="field"><label>Complaint / Work Scope</label><textarea id="scope"></textarea></div><button class="btn" onclick="createJob()">Create Ticket</button></div>`}
function createJob(){let systems=[...document.querySelectorAll('#systems .chip.on')].map(x=>x.textContent); if(!client.value||!site.value||!systems.length) return alert('Client, Site and at least one System required'); let j={ticketId:id(jobType.value==='Service Call'?'SRV':'JOB'),type:jobType.value,priority:priority.value,client:client.value,site:site.value,systems,assignedTo:assign.value,sla:sla.value,scope:scope.value,status:'Assigned',createdBy:current.username,createdAt:now(),acceptedBy:'',timeline:[],workdays:[],checklist:defaultChecklist(jobType.value,systems),materials:[],recommendations:[],customerRemarks:'',customerSign:'',engineerSign:'',reportShared:false,review:'',closure:''}; j.timeline.push({at:now(),by:current.name,action:'Ticket Created / Assigned'}); state.jobs.unshift(j); notifyWorkflow(j,'New job assigned'); save(); activeView='jobs'; openJob(j.ticketId)}
function defaultChecklist(type,systems){let base=[]; systems.forEach(s=>{ if(type==='Preventive Maintenance') base.push(`${s} - Device cleaning completed`,`${s} - Cable dressing / termination checked`,`${s} - Old/pending issues verified`,`${s} - Functional test completed`,`${s} - Recommendations recorded`); else if(type==='Service Call') base.push(`${s} - Complaint verified`,`${s} - Root cause identified`,`${s} - Action taken`,`${s} - System restored / pending reason`); else if(type==='Installation') base.push(`${s} - Installed as per location`,`${s} - Cable/termination completed`,`${s} - Functional test passed`,`${s} - Snag/punch point updated`); else if(type==='Commissioning') base.push(`${s} - Power/communication checked`,`${s} - Device test completed`,`${s} - Integration/cause-effect checked`,`${s} - Acceptance status recorded`); else base.push(`${s} - Existing asset verified`,`${s} - Operational condition checked`,`${s} - Risk/remarks updated`); }); return base.map((text,i)=>({id:i+1,text,status:'Pending',remarks:''}))}
function openJob(tid){activeJob=state.jobs.find(j=>j.ticketId===tid); renderJob(activeJob)}
function stageIndex(s){return ['Assigned','Accepted','Traveling','Checked-In','Working','Report Draft','Report Shared','Checked-Out','Closed'].indexOf(s)}
function renderJob(j){pageTitle.textContent='Ticket '+j.ticketId; let stages=['Assigned','Accepted','Traveling','Checked-In','Working','Report Draft','Report Shared','Checked-Out','Closed']; view.innerHTML=`<div class="card"><div class="actions no-print"><button class="btn secondary" onclick="activeJob=null;activeView='jobs';render()">← Back</button><button class="btn secondary" onclick="renderFinalReport('${j.ticketId}')">Preview Final Report</button><button class="btn secondary" onclick="window.print()">Print / Save PDF</button></div><h2>${j.client} · ${j.site}</h2><p><b>${j.type}</b> · ${j.systems.join(', ')} · <span class="pill ${j.priority==='Critical'?'bad':j.priority==='High'?'warn':''}">${j.priority}</span> · SLA: ${j.sla}</p><div class="steps">${stages.map((s,i)=>`<span class="step ${i<stageIndex(j.status)?'done':s===j.status?'active':''}">${s}</span>`).join('')}</div><p class="muted">Scope: ${esc(j.scope)}</p></div>${workflowPanel(j)}${workdayPanel(j)}${reportPanel(j)}`}
function workflowPanel(j){let b=''; if(j.status==='Assigned') b=`<button class="btn" onclick="advance('${j.ticketId}','Accepted','Accepted by user')">Accept Job</button>`; if(j.status==='Accepted') b=`<button class="btn" onclick="advance('${j.ticketId}','Traveling','Travel started')">Start Travel</button>`; if(j.status==='Traveling') b=`<button class="btn" onclick="checkin('${j.ticketId}')">Check-In</button>`; if(j.status==='Checked-In') b=`<button class="btn" onclick="advance('${j.ticketId}','Working','Work started')">Start Work</button>`; if(j.status==='Working') b=`<button class="btn" onclick="advance('${j.ticketId}','Report Draft','Work completed / Report generated')">Generate Report</button>`; if(j.status==='Report Draft') b=`<button class="btn ok" onclick="shareReport('${j.ticketId}')">Report Submitted/Shared to Customer</button>`; if(j.status==='Report Shared') b=`<button class="btn warn" onclick="checkout('${j.ticketId}')">Check-Out After Report Sharing</button>`; if(j.status==='Checked-Out'&&['Admin','Coordinator','Supervisor'].includes(current.role)) b=`<button class="btn bad" onclick="closeTicket('${j.ticketId}')">Close Ticket</button>`; return `<div class="card"><h3>Workflow Action</h3><div class="actions">${b||'<span class="muted">No action available for this role/stage.</span>'}</div><p class="note">Check-Out is allowed only after the report is generated, reviewed with customer, and shared by WhatsApp/Email. Ticket closure is separate and done by Coordinator/Supervisor/Admin.</p></div>`}
function advance(tid,status,action){let j=state.jobs.find(x=>x.ticketId===tid); if(status==='Accepted') j.acceptedBy=current.username; j.status=status; j.timeline.push({at:now(),by:current.name,action}); notifyWorkflow(j,action); save(); renderJob(j)}
function checkin(tid){let j=state.jobs.find(x=>x.ticketId===tid); j.status='Checked-In'; j.workdays.push({day:j.workdays.length+1,checkIn:now(),checkOut:'',activity:''}); j.timeline.push({at:now(),by:current.name,action:'Checked-In'}); notifyWorkflow(j,'Checked-In'); save(); renderJob(j)}
function checkout(tid){let j=state.jobs.find(x=>x.ticketId===tid); let d=j.workdays[j.workdays.length-1]||{day:1}; d.checkOut=now(); if(!j.workdays.length) j.workdays.push(d); j.status='Checked-Out'; j.timeline.push({at:now(),by:current.name,action:'Checked-Out after report sharing'}); notifyWorkflow(j,'Checked-Out / ready for closure'); save(); renderJob(j)}
function shareReport(tid){let j=state.jobs.find(x=>x.ticketId===tid); if(current.role==='Engineer'&&!j.customerSign) return alert('Customer signature/remarks required before engineer shares final service report.'); j.status='Report Shared'; j.reportShared=true; j.timeline.push({at:now(),by:current.name,action:'Final report shared to customer by WhatsApp/Email'}); notifyWorkflow(j,'Final report shared'); save(); renderJob(j)}
function closeTicket(tid){let j=state.jobs.find(x=>x.ticketId===tid); if(j.status!=='Checked-Out') return alert('Ticket can be closed only after Check-Out.'); j.status='Closed'; j.closure=`Closed by ${current.name} on ${now()}`; j.timeline.push({at:now(),by:current.name,action:'Ticket Closed'}); notifyWorkflow(j,'Ticket closed'); save(); renderJob(j)}
function workdayPanel(j){return `<div class="card"><h3>Multi-Day Work Log</h3>${j.workdays.map((d,i)=>`<div class="card"><b>Day ${d.day}</b><br>Check-In: ${d.checkIn||'-'}<br>Check-Out: ${d.checkOut||'-'}<div class="field"><label>Day Activity</label><textarea onchange="updDay('${j.ticketId}',${i},this.value)">${d.activity||''}</textarea></div></div>`).join('')||'<p class="muted">No check-in yet.</p>'}</div>`}
function updDay(tid,i,v){let j=state.jobs.find(x=>x.ticketId===tid); j.workdays[i].activity=v; save(false)}
function reportPanel(j){return `<div class="card"><h3>Report Details</h3><h4>Checklist / Checkpoints</h4><div class="tablewrap"><table><tr><th>#</th><th>Checkpoint</th><th>Status</th><th>Remarks</th></tr>${j.checklist.map((c,i)=>`<tr><td>${i+1}</td><td>${esc(c.text)}</td><td><select onchange="updChk('${j.ticketId}',${i},'status',this.value)"><option ${c.status==='Pending'?'selected':''}>Pending</option><option ${c.status==='OK'?'selected':''}>OK</option><option ${c.status==='Fault'?'selected':''}>Fault</option><option ${c.status==='NA'?'selected':''}>NA</option></select></td><td><input value="${esc(c.remarks)}" onchange="updChk('${j.ticketId}',${i},'remarks',this.value)"></td></tr>`).join('')}</table></div><button class="btn secondary" onclick="addChecklist('${j.ticketId}')">+ Add Checkpoint</button><div class="grid two"><div><h4>Materials Used</h4><div id="matlist">${j.materials.map(m=>`<span class="pill">${esc(m)}</span>`).join('')}</div><input id="matInput" placeholder="Item, Qty, Remarks"><button class="btn secondary" onclick="addItem('${j.ticketId}','materials',matInput.value);matInput.value=''">Add Material</button></div><div><h4>Recommendations</h4><div>${j.recommendations.map(m=>`<span class="pill warn">${esc(m)}</span>`).join('')}</div><input id="recInput" placeholder="Recommendation / pending issue"><button class="btn secondary" onclick="addItem('${j.ticketId}','recommendations',recInput.value);recInput.value=''">Add Recommendation</button></div></div><div class="field"><label>Customer Feedback / Remarks</label><textarea onchange="updField('${j.ticketId}','customerRemarks',this.value)">${j.customerRemarks||''}</textarea></div><div class="grid two"><div><label>Engineer Signature Name</label><input value="${j.engineerSign||''}" onchange="updField('${j.ticketId}','engineerSign',this.value)" placeholder="Name / digital sign confirmation"></div><div><label>Customer Signature Name</label><input value="${j.customerSign||''}" onchange="updField('${j.ticketId}','customerSign',this.value)" placeholder="Customer/FM name"></div></div></div>`}
function updChk(tid,i,k,v){let j=state.jobs.find(x=>x.ticketId===tid); j.checklist[i][k]=v; save(false)}
function updField(tid,k,v){let j=state.jobs.find(x=>x.ticketId===tid); j[k]=v; save(false)}
function addChecklist(tid){let j=state.jobs.find(x=>x.ticketId===tid); let t=prompt('Checkpoint'); if(t){j.checklist.push({id:j.checklist.length+1,text:t,status:'Pending',remarks:''}); save(); renderJob(j)}}

function renderSettings(){pageTitle.textContent='Admin Settings / Cloud'; let canAdmin=current.role==='Admin'; view.innerHTML=`
<div class="card"><h3>Firebase Cloud Sync (Free Pilot)</h3><p class="note">Firebase config is already embedded for PISL FieldOps. Enable Firestore + Anonymous Authentication in Firebase, then click Save & Connect Firebase if not connected automatically. Until Firebase is enabled, the app works in local mode.</p><div class="grid two"><div><label>Firebase Web Config JSON</label><textarea id="fbconfig" placeholder='{"apiKey":"...","authDomain":"...","projectId":"..."}'>${localStorage.getItem('pisl_firebase_config')||JSON.stringify(DEFAULT_FIREBASE_CONFIG,null,2)}</textarea></div><div><label>Cloud Status</label><div class="pill ${cloudReady?'ok':'warn'}">${cloudReady?'Connected':'Local / Not Connected'}</div><p class="muted">Hosting can remain on GitHub Pages. Database runs on Firebase Spark free tier.</p><button class="btn" onclick="saveFirebaseConfig()">Save & Connect Firebase</button><button class="btn secondary" onclick="disableFirebase()">Disable Cloud</button></div></div></div>
<div class="card"><h3>User Management & Reporting Hierarchy</h3>${!canAdmin?'<p class="note">Only Admin can create/edit users.</p>':`<div class="grid two"><div class="field"><label>Name</label><input id="newName"></div><div class="field"><label>Username</label><input id="newUsername"></div><div class="field"><label>Password</label><input id="newPassword" type="password"></div><div class="field"><label>Role</label><select id="newRole"><option>Engineer</option><option>Supervisor</option><option>Coordinator</option><option>Operations</option><option>Admin</option></select></div><div class="field"><label>Reports To</label><select id="newReportsTo"><option value="">None</option>${users().map(u=>`<option>${u.name}</option>`).join('')}</select></div><div class="field"><label>Mobile / Email</label><input id="newContact" placeholder="mobile / email"></div></div><button class="btn" onclick="addUser()">Create User</button>`}<div class="tablewrap"><table><tr><th>Name</th><th>Username</th><th>Role</th><th>Reports To</th><th>Status</th><th>Action</th></tr>${users().map(u=>`<tr><td>${esc(u.name)}</td><td>${esc(u.username)}</td><td>${u.role}</td><td>${esc(u.reportsTo||'')}</td><td><span class="pill ${u.status==='Inactive'?'bad':'ok'}">${u.status||'Active'}</span></td><td>${canAdmin?`<button class="btn secondary" onclick="toggleUser('${u.id}')">${u.status==='Inactive'?'Activate':'Disable'}</button>`:''}</td></tr>`).join('')}</table></div></div>
<div class="card"><h3>Customer / Site Masters</h3><div class="grid two"><div><label>Add Customer</label><input id="newClient"><button class="btn secondary" onclick="addClient()">Add Customer</button></div><div><label>Add Site / Location</label><input id="newSite"><button class="btn secondary" onclick="addSite()">Add Site</button></div></div><p><b>Customers:</b> ${state.clients.map(c=>`<span class="pill">${esc(c)}</span>`).join('')}</p><p><b>Sites:</b> ${(state.sites||[]).map(s=>`<span class="pill">${esc(s)}</span>`).join('')||'<span class="muted">No saved sites yet</span>'}</p></div>`}
function addUser(){let name=newName.value.trim(), username=newUsername.value.trim(), password=newPassword.value.trim(); if(!name||!username||!password) return alert('Name, username and password required'); if(users().some(u=>u.username===username)) return alert('Username already exists'); state.users.push({id:'u'+Date.now(),name,username,password,role:newRole.value,reportsTo:newReportsTo.value,status:'Active',mobile:newContact.value,email:newContact.value}); save(); renderSettings();}
function toggleUser(id){let u=users().find(x=>x.id===id); if(!u) return; if(u.username==='sandeep') return alert('Primary admin cannot be disabled'); u.status=u.status==='Inactive'?'Active':'Inactive'; save(); renderSettings();}
function addClient(){let c=newClient.value.trim(); if(c && !state.clients.includes(c)) state.clients.push(c); save(); renderSettings();}
function addSite(){let s=newSite.value.trim(); state.sites=state.sites||[]; if(s && !state.sites.includes(s)) state.sites.push(s); save(); renderSettings();}
function saveFirebaseConfig(){try{JSON.parse(fbconfig.value); localStorage.setItem('pisl_firebase_config',fbconfig.value); alert('Firebase config saved. Reconnecting now.'); initFirebase();}catch(e){alert('Invalid JSON config')}}
function disableFirebase(){localStorage.removeItem('pisl_firebase_config'); cloudReady=false; db=null; if(cloudUnsub) cloudUnsub(); alert('Cloud disabled. Local mode active.'); renderSettings();}


function initFirebase(){let raw=localStorage.getItem('pisl_firebase_config') || JSON.stringify(DEFAULT_FIREBASE_CONFIG); if(typeof firebase==='undefined') return; try{let cfg=JSON.parse(raw); if(!firebase.apps.length) firebase.initializeApp(cfg); try{ if(firebase.analytics && cfg.measurementId){ firebase.analytics(); } }catch(_e){} if(!localStorage.getItem('pisl_firebase_config')) localStorage.setItem('pisl_firebase_config', JSON.stringify(cfg,null,2)); firebase.auth().signInAnonymously().then(()=>{db=firebase.firestore(); cloudReady=true; let ref=db.collection('pislFieldOps').doc('sharedState'); if(cloudUnsub) cloudUnsub(); cloudUnsub=ref.onSnapshot(snap=>{if(snap.exists){let data=snap.data(); if(data && data.state){cloudSilent=true; state=Object.assign(state,data.state); if(!state.users) state.users=DEFAULT_USERS.slice(); localStorage.setItem(LS,JSON.stringify(state)); cloudSilent=false; render();}}},err=>{console.warn('Cloud listen error',err);}); ref.get().then(doc=>{if(!doc.exists) cloudSave();}); render();}).catch(e=>{console.warn('Firebase auth failed',e); alert('Firebase connect failed: '+e.message)});}catch(e){console.warn('Firebase config error',e)}}
function cloudSave(){if(!db||!cloudReady) return; db.collection('pislFieldOps').doc('sharedState').set({state,updatedAt:new Date().toISOString()},{merge:true}).catch(e=>console.warn('Cloud save failed',e));}

function seedDemo(){if(state.jobs.length&&!confirm('Add demo data?'))return; let j={ticketId:id('SRV'),type:'Service Call',priority:'High',client:'Swiggy',site:'16F Command Center',systems:['CCTV','ACS'],assignedTo:'engineer',sla:'8 Hours',scope:'Camera offline and door lock issue reported.',status:'Assigned',createdBy:current.username,createdAt:now(),acceptedBy:'',timeline:[{at:now(),by:current.name,action:'Demo ticket created'}],workdays:[],checklist:defaultChecklist('Service Call',['CCTV','ACS']),materials:[],recommendations:[],customerRemarks:'',customerSign:'',engineerSign:'',reportShared:false,review:'',closure:''}; state.jobs.unshift(j); notifyWorkflow(j,'New job assigned'); save(); render()}
function exportBackup(){let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'})); a.download='pisl-fieldops-backup.json'; a.click()}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fmt(n){return '₹ '+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2})}
load(); const saved=sessionStorage.getItem('pisl_user'); if(saved){current=JSON.parse(saved); document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); init();}
</script></body></html>
